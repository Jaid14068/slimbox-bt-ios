# =========================
# Bluetooth Core
# =========================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Slimbox Xbox"
CONFIG_BT_DEVICE_APPEARANCE=961

# =========================
# HID (Gamepad)
# =========================
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=1

# =========================
# DIS (Device Info Service)
# =========================
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="Microsoft"

CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x045e
CONFIG_BT_DIS_PNP_PID=0x028e
CONFIG_BT_DIS_PNP_VER=0x0100

# =========================
# Buffers
# =========================
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# =========================
# Logging
# =========================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
