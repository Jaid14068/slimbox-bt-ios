# ================================
# Core Bluetooth Stack
# ================================

CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_HCI_HOST=y
CONFIG_BT_CONN=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y

# ================================
# Device Identity (iOS / Xbox style)
# ================================

CONFIG_BT_DEVICE_NAME="Slimbox Xbox"
CONFIG_BT_DEVICE_APPEARANCE=961

# ================================
# Device Information Service (DIS)
# ================================

CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="Microsoft"

CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x045e
CONFIG_BT_DIS_PNP_PID=0x028e
CONFIG_BT_DIS_PNP_VER=0x0100

# ================================
# HID (Gamepad over BLE)
# ================================

CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=1

# ================================
# GATT + ATT tuning (important for iOS)
# ================================

CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_ATT_PREPARE_COUNT=0

# ================================
# Connection stability (important)
# ================================

CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# ================================
# Logging (helps debugging, safe)
# ================================

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ================================
# Memory / Stack
# ================================

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
