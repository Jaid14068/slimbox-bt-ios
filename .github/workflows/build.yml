name: build

on:
  push:
    paths:
      - 'app/**'
      - 'west.yml'
      - 'build.py'
      - 'builds.json'
  workflow_call:

defaults:
  run:
    shell: bash --noprofile --norc -x -e -o pipefail {0}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up some disk space
        run: |
          df -h
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/share/dotnet || true
          df -h

      - uses: actions/checkout@v4

      # ✅ Install Python deps (THIS fixes your error)
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyelftools west

      # ✅ Initialize Zephyr manually (instead of Docker)
      - name: Setup Zephyr
        run: |
          west init -l .
          west update
          west zephyr-export

      # ✅ Build
      - name: Build firmware
        run: |
          ./build.py builds.json > build.sh
          chmod +x build.sh
          ./build.sh vatican-cameos

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts/*
