name: Build Slimbox Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ninja-build cmake gperf ccache dfu-util device-tree-compiler wget git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install west
        run: pip install west

      - name: Initialize west workspace
        run: |
          west init -l .
          west update

      - name: Install Zephyr SDK (minimal)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          tar -xf zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-0.16.5
          ./setup.sh -t arm-zephyr-eabi

      - name: Set SDK environment
        run: |
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
          echo "ZEPHYR_SDK_INSTALL_DIR=$PWD/zephyr-sdk-0.16.5" >> $GITHUB_ENV

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build firmware
        run: |
          west build -b adafruit_feather_nrf52840 app --pristine

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: slimbox-firmware
          path: build/zephyr/*.uf2
