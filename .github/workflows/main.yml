name: Build Slimbox Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install west
        run: pip install west

      - name: Initialize west workspace
        run: |
          west init -l .
          west update

      - name: Setup Zephyr environment
        uses: zephyrproject-rtos/action-zephyr@v1

      - name: Export Zephyr environment
        run: west zephyr-export

      - name: Build firmware
        run: |
          west build -b adafruit_feather_nrf52840 app --pristine

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: slimbox-firmware
          path: build/zephyr/*.uf2
